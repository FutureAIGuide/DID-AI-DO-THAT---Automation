name: Weekly production

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: Days of recent developments to consider during discovery.
        required: false
        default: '30'
      story_count:
        description: Number of ranked stories to process this run.
        required: false
        default: '1'
      model:
        description: Optional OpenRouter model override.
        required: false
        default: ''
  schedule:
    # Runs every Monday at 14:30 UTC.
    - cron: '30 14 * * 1'

permissions:
  contents: write

concurrency:
  group: dadt-weekly-production
  cancel-in-progress: false

jobs:
  discover:
    uses: ./.github/workflows/daily-discovery.yml
    with:
      lookback_days: ${{ inputs.lookback_days || '30' }}
      selection_count: ${{ inputs.story_count || '1' }}
      model: ${{ inputs.model || '' }}
    secrets: inherit

  produce:
    needs: discover
    if: needs.discover.outputs.has_selected_stories == 'true'
    strategy:
      fail-fast: false
      matrix:
        story_slug: ${{ fromJson(needs.discover.outputs.selected_slugs_json) }}
    uses: ./.github/workflows/story-production.yml
    with:
      story_slug: ${{ matrix.story_slug }}
      model: ${{ inputs.model || '' }}
    secrets: inherit

  no-stories:
    needs: discover
    if: needs.discover.outputs.has_selected_stories != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Summarize no-op weekly run
        run: |
          cat <<'EOF' >>"$GITHUB_STEP_SUMMARY"
          # Weekly production

          - Discovery status: `${{ needs.discover.outputs.selection_status }}`
          - Selected story count: `${{ needs.discover.outputs.selected_count }}`
          - Selection manifest: `${{ needs.discover.outputs.selection_manifest_path }}`
          - Result: `No story-production jobs were started.`
          EOF

  summarize:
    needs:
      - discover
      - produce
      - no-stories
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize weekly orchestration
        run: |
          cat <<'EOF' >>"$GITHUB_STEP_SUMMARY"
          # Weekly production summary

          - Discovery status: `${{ needs.discover.outputs.selection_status }}`
          - Selected story count: `${{ needs.discover.outputs.selected_count }}`
          - Selected slugs: `${{ needs.discover.outputs.selected_slugs_json }}`
          - Selection manifest: `${{ needs.discover.outputs.selection_manifest_path }}`
          EOF
