name: Publish pipeline

on:
  workflow_dispatch:
    inputs:
      story_slug:
        description: Optional slug prefix to package and archive.
        required: false
        default: ''
  workflow_run:
    workflows:
      - Story production
      - Weekly production
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: dadt-publish-pipeline
  cancel-in-progress: false

jobs:
  package:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate publishing packages and archive approved assets
        env:
          STORY_SLUG_FILTER: ${{ inputs.story_slug }}
          SOURCE_RUN_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || '' }}
        run: |
          python <<'PY'
          import json
          import os
          import pathlib
          import shutil

          root = pathlib.Path(os.environ["GITHUB_WORKSPACE"])
          filter_slug = os.environ.get("STORY_SLUG_FILTER", "").strip()
          packages_root = root / "publishing/packages"
          reports_root = root / "publishing/reports"
          archive_root = root / "archive"
          source_run_id = os.environ.get("SOURCE_RUN_ID", "").strip()

          required_files = [
              "article.md",
              "newsletter.md",
              "linkedin.md",
              "x-threads.md",
              "shorts.md",
              "tiktoks.md",
              "thumbnail-brief.md",
              "social-brief.md",
              "prompt-pad.md",
              "seo.md",
              "youtube.md",
              "distribution.md",
              "executive-summary.md",
              "metadata.md",
              "research-packet.md",
              "draft-verification-report.md",
              "package-verification-report.md",
              "workflow-status.json",
          ]

          if not packages_root.exists():
              package_dirs = []
          else:
              package_dirs = sorted(
                  path for path in packages_root.iterdir()
                  if path.is_dir() and path.name != ".gitkeep" and (not filter_slug or path.name.startswith(filter_slug))
              )

          filtered_package_dirs = []
          for package_dir in package_dirs:
              status_path = package_dir / "workflow-status.json"
              if not status_path.exists():
                  continue
              try:
                  workflow_status = json.loads(status_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  continue
              if source_run_id and str(workflow_status.get("source_run_id", "")).strip() != source_run_id:
                  continue
              filtered_package_dirs.append((package_dir, workflow_status))

          if not filtered_package_dirs:
              summary = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"])
              summary.write_text(
                  "# Publish pipeline\n\n- Result: `No publishable packages matched this run.`\n",
                  encoding="utf-8",
              )
              raise SystemExit(0)

          processed = []
          for package_dir, workflow_status in filtered_package_dirs:
              missing = [name for name in required_files if not (package_dir / name).exists()]
              draft_report = (package_dir / "draft-verification-report.md").read_text(encoding="utf-8") if (package_dir / "draft-verification-report.md").exists() else ""
              package_report = (package_dir / "package-verification-report.md").read_text(encoding="utf-8") if (package_dir / "package-verification-report.md").exists() else ""
              approved = bool(workflow_status.get("archive_eligible")) and not missing
              status = "PUBLISH" if approved else "HOLD"
              report_path = reports_root / f"{package_dir.name}-pipeline-validation-report.md"
              report_path.write_text(
                  "\n".join(
                      [
                          "# Publish Pipeline Validation",
                          "",
                          f"- Package: `{package_dir.relative_to(root).as_posix()}`",
                          f"- Status: `{status}`",
                          f"- Source run id: `{workflow_status.get('source_run_id', '')}`",
                          f"- Pipeline status: `{workflow_status.get('pipeline_status', '')}`",
                          f"- Draft decision: `{workflow_status.get('draft_decision', '')}`",
                          f"- Package decision: `{workflow_status.get('package_decision', '')}`",
                          f"- Missing files: {', '.join(missing) if missing else 'none'}",
                          f"- Draft verification present: `{'yes' if draft_report else 'no'}`",
                          f"- Package verification present: `{'yes' if package_report else 'no'}`",
                      ]
                  )
                  + "\n",
                  encoding="utf-8",
              )
              if approved:
                  archive_dir = archive_root / package_dir.name
                  shutil.copytree(package_dir, archive_dir, dirs_exist_ok=True)
                  (archive_dir / "archive-manifest.md").write_text(
                      "\n".join(
                          [
                              "# Archive Manifest",
                              "",
                              f"- Story package: `{package_dir.name}`",
                              "- Source assets retained in their original repository locations.",
                              "- This archive mirrors the approved publishing package at packaging time.",
                          ]
                      )
                      + "\n",
                      encoding="utf-8",
                  )
              processed.append((package_dir.name, status))

          summary = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary.write_text(
              "# Publish pipeline\n\n"
              + (f"- Source run id: `{source_run_id}`\n" if source_run_id else "")
              + "\n".join(f"- `{name}` → `{status}`" for name, status in processed)
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit package validation and archive updates
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add publishing/reports archive
          if git diff --cached --quiet; then
            echo "No publish-pipeline changes to commit."
            exit 0
          fi
          git commit -m "Run publish pipeline validation"
          git push
